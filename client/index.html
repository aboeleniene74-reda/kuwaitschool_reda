<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>منصة التعليم الثانوي بالكويت</title>
    <link rel="alternate" hreflang="ar-kw" href="https://kuwait-secondary-school.manus.space" />
    <link rel="alternate" hreflang="ar" href="https://kuwait-secondary-school.manus.space" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"></noscript>
    <style>
      body {
        font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    
    <!-- Schema.org structured data for local business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "منصة ثانوي علمي بالكويت",
      "alternateName": "فارس العلوم",
      "description": "أفضل منصة تعليمية في الكويت للمرحلة الثانوية - مذكرات ومراجعات علمية شاملة للكيمياء والأحياء والفيزياء والجيولوجيا",
      "url": "https://kuwait-secondary-school.manus.space",
      "telephone": "+965-99457080",
      "areaServed": {
        "@type": "Country",
        "name": "الكويت"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "KW",
        "addressLocality": "الكويت"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "29.3759",
        "longitude": "47.9774"
      },
      "inLanguage": "ar-KW",
      "audience": {
        "@type": "EducationalAudience",
        "educationalRole": "student",
        "audienceType": "طلاب المرحلة الثانوية في الكويت"
      },
      "offers": {
        "@type": "Offer",
        "category": "مذكرات ومراجعات دراسية",
        "areaServed": "KW"
      },
      "keywords": "مذكرات ثانوي الكويت, مراجعات ثانوي علمي الكويت, ملخص الزبدة جيولوجيا, فارس العلوم, ملخص كيمياء 11, ملخص أحياء 11, ملخص فيزياء"
    }
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
